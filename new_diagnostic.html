{% extends "layout.html" %}
{% block content %}
<section class="card narrow">
  <h1>Nouveau diagnostic</h1>
  <form method="post" class="form-grid">
    <label>Titre du diagnostic</label>
    <input name="title" value="Diagnostic LAVINA - Maintenance">
    <label>Société</label>
    <input name="company" placeholder="Nom de l’entreprise">
    <label>Site / atelier</label>
    <input name="site" placeholder="Ex : Usine 1">
    <label>Auditeur</label>
    <input name="auditor" placeholder="Nom de l’auditeur">
    <button class="primary">Créer le diagnostic</button>
  </form>
</section>
{% endblock %}
