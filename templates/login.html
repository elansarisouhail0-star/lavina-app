{% extends "layout.html" %}
{% block content %}
<section class="login-card">
  <div class="industrial-logo">⚙️🔧🏭</div>
  <h1>Connexion</h1>
  <p>Application multi-utilisateurs pour diagnostic maintenance selon la méthode LAVINA.</p>
  <form method="post">
    <label>Nom d’utilisateur</label>
    <input name="username" required placeholder="admin">
    <label>Mot de passe</label>
    <input name="password" type="password" required placeholder="admin123">
    <button class="primary">Se connecter</button>
  </form>
  <div class="hint">Compte initial : <strong>admin</strong> / <strong>admin123</strong></div>
</section>
{% endblock %}
